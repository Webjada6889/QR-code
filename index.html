<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QR Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">

    <h1 class="text-3xl font-bold mb-2"> Jada QR Generator</h1>
    <p class="text-gray-500 mb-6">Enter text or URL</p>
    <p class="text-gray-500 mb-6">Fast and easy QR code generation</p>

    <input id="text" type="text" placeholder="https://example.com"
        class="w-full px-4 py-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-purple-500">

    <button onclick="generateQR()"
        class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700">
        Generate QR Code
    </button>

    <div id="qrContainer" class="mt-6 hidden">
        <canvas id="qrCanvas" class="mx-auto"></canvas>
<!-- 
        <button onclick="downloadQR()"
            class="mt-4 text-purple-600 hover:underline">
            Download QR
        </button>
    </div> -->
<br>
<br>
    
    <button onclick="downloadQR()"
        class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700">
        Download QR code
    </button>

</div>

<script>
function generateQR() {
    const text = document.getElementById('text').value;
    const canvas = document.getElementById('qrCanvas');
    const container = document.getElementById('qrContainer');

    if (!text) {
        alert("Enter something!");
        return;
    }

    QRCode.toCanvas(canvas, text, function (error) {
        if (error) console.error(error);
        container.classList.remove('hidden');
    });
}

function downloadQR() {
    const canvas = document.getElementById('qrCanvas');
    const link = document.createElement('a');

    link.download = "qrcode.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
